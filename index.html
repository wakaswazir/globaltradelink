<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GlobalTradeLink — International Trading Company</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0a1628;--blue:#1a3a6b;--mid-blue:#2563ab;--sky:#3b82f6;
  --steel:#e8edf5;--white:#ffffff;--grey:#f4f6fa;--text:#1a2540;
  --muted:#6b7a99;--border:#dde3f0;--accent:#f59e0b;
  --success:#10b981;--danger:#ef4444;--red:#dc2626;
  --shadow:0 4px 24px rgba(10,22,40,0.10);
  --shadow-lg:0 12px 48px rgba(10,22,40,0.18);
}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:#fff;line-height:1.6}
h1,h2,h3,.logo-text{font-family:'Playfair Display',serif}
a{text-decoration:none;color:inherit}
img{max-width:100%;height:auto}
button{cursor:pointer;font-family:inherit}

/* LAYOUT */
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.flex{display:flex;align-items:center}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.gap-8{gap:8px} .gap-12{gap:12px} .gap-16{gap:16px}

/* NAVBAR */
#navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--navy);box-shadow:0 2px 20px rgba(0,0,0,0.3);transition:all .3s}
#navbar.scrolled{background:rgba(10,22,40,0.97);backdrop-filter:blur(12px)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:1300px;margin:0 auto}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--sky),var(--mid-blue));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.5);font-family:'DM Sans',sans-serif;font-weight:300;letter-spacing:2px;text-transform:uppercase}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-link{color:rgba(255,255,255,0.8);padding:8px 16px;border-radius:6px;font-size:14px;font-weight:500;transition:all .2s}
.nav-link:hover,.nav-link.active{color:#fff;background:rgba(255,255,255,0.1)}
.nav-btn{background:var(--sky);color:#fff;padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;border:none;transition:all .2s}
.nav-btn:hover{background:var(--mid-blue);transform:translateY(-1px)}
.mobile-menu-btn{display:none;background:none;border:none;color:#fff;font-size:24px;padding:4px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-size:15px;font-weight:600;border:none;transition:all .25s;cursor:pointer}
.btn-primary{background:var(--sky);color:#fff}.btn-primary:hover{background:var(--mid-blue);transform:translateY(-2px);box-shadow:0 8px 20px rgba(37,99,171,0.35)}
.btn-secondary{background:transparent;color:var(--sky);border:2px solid var(--sky)}.btn-secondary:hover{background:var(--sky);color:#fff}
.btn-white{background:#fff;color:var(--navy)}.btn-white:hover{background:var(--steel);transform:translateY(-2px)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{background:#059669}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-ghost{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.2)}.btn-ghost:hover{background:rgba(255,255,255,0.15)}

/* HERO */
#hero{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 60%,#1e4a8a 100%);min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding-top:80px}
.hero-bg-pattern{position:absolute;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(59,130,246,0.15) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(245,158,11,0.08) 0%,transparent 40%);pointer-events:none}
.hero-content{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:80px 24px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.4);color:#93c5fd;padding:6px 16px;border-radius:100px;font-size:13px;font-weight:500;margin-bottom:24px}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:#3b82f6;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hero-title{font-size:clamp(36px,5vw,58px);font-weight:700;color:#fff;line-height:1.15;margin-bottom:20px}
.hero-title span{color:var(--accent)}
.hero-desc{font-size:18px;color:rgba(255,255,255,0.72);margin-bottom:36px;line-height:1.7;font-weight:300}
.hero-actions{display:flex;gap:16px;flex-wrap:wrap}
.hero-stats{display:flex;gap:32px;margin-top:48px}
.hero-stat-num{font-size:32px;font-weight:700;color:#fff;font-family:'Playfair Display',serif}
.hero-stat-label{font-size:13px;color:rgba(255,255,255,0.55);margin-top:2px}
.hero-visual{position:relative}
.hero-card{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:24px;backdrop-filter:blur(8px)}
.hero-card-title{color:rgba(255,255,255,0.6);font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px}
.hero-cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hero-cat-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:16px;transition:all .3s;cursor:pointer}
.hero-cat-item:hover{background:rgba(59,130,246,0.2);border-color:rgba(59,130,246,0.4);transform:translateY(-2px)}
.hero-cat-icon{font-size:28px;margin-bottom:8px}
.hero-cat-name{color:#fff;font-weight:600;font-size:14px}
.hero-cat-count{color:rgba(255,255,255,0.5);font-size:12px;margin-top:2px}

/* SECTIONS */
.section{padding:80px 0}
.section-alt{background:var(--grey)}
.section-header{text-align:center;margin-bottom:56px}
.section-label{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--sky);margin-bottom:12px}
.section-title{font-size:clamp(28px,4vw,42px);font-weight:700;color:var(--navy);margin-bottom:16px}
.section-desc{font-size:17px;color:var(--muted);max-width:600px;margin:0 auto}

/* CATEGORY CARDS */
.cat-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s;position:relative}
.cat-card:hover{border-color:var(--sky);box-shadow:var(--shadow-lg);transform:translateY(-4px)}
.cat-card-img{height:200px;background:var(--steel);display:flex;align-items:center;justify-content:center;font-size:60px;position:relative;overflow:hidden}
.cat-card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.cat-card-body{padding:20px}
.cat-card-name{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:6px}
.cat-card-desc{font-size:14px;color:var(--muted);margin-bottom:16px}
.cat-card-arrow{display:inline-flex;align-items:center;gap:6px;color:var(--sky);font-weight:600;font-size:14px}

/* PRODUCT CARDS */
.product-card{background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;transition:all .3s;cursor:pointer}
.product-card:hover{border-color:var(--sky);box-shadow:var(--shadow-lg);transform:translateY(-4px)}
.product-card-img{height:220px;background:var(--steel);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:50px}
.product-card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.product-card-badge{position:absolute;top:12px;left:12px;background:var(--accent);color:var(--navy);padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700}
.product-card-body{padding:20px}
.product-card-cat{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--sky);margin-bottom:6px}
.product-card-name{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:8px;line-height:1.3}
.product-card-spec{font-size:13px;color:var(--muted);margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-card-actions{display:flex;gap:8px}

/* PRODUCT DETAIL */
.product-detail-layout{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start}
.gallery-main{border-radius:16px;overflow:hidden;height:400px;background:var(--steel);display:flex;align-items:center;justify-content:center;font-size:80px;position:relative}
.gallery-main img{width:100%;height:100%;object-fit:contain}
.gallery-thumbs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.thumb{width:72px;height:72px;border-radius:8px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:var(--steel);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.thumb.active{border-color:var(--sky)}
.thumb img{width:100%;height:100%;object-fit:cover}
.spec-table{width:100%;border-collapse:collapse;margin-top:24px}
.spec-table tr:nth-child(even){background:var(--grey)}
.spec-table td{padding:10px 14px;font-size:14px;border-bottom:1px solid var(--border)}
.spec-table td:first-child{font-weight:600;color:var(--navy);width:40%;background:var(--steel)}

/* INQUIRY FORM */
.inquiry-card{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:36px;box-shadow:var(--shadow)}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
.form-input,.form-textarea,.form-select{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:15px;color:var(--text);background:#fff;transition:border .2s;outline:none}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.form-textarea{resize:vertical;min-height:120px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* BREADCRUMB */
.breadcrumb{padding:16px 0;font-size:13px;color:var(--muted)}
.breadcrumb a{color:var(--sky)}.breadcrumb a:hover{text-decoration:underline}
.breadcrumb span{margin:0 6px}

/* SEARCH & FILTER */
.filter-bar{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:32px;display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.search-input{width:100%;padding:11px 14px 11px 42px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--sky)}

/* ADMIN */
.admin-layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.admin-sidebar{background:var(--navy);padding:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.admin-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.admin-logo-text{font-size:18px;font-weight:700;color:#fff;font-family:'Playfair Display',serif}
.admin-logo-sub{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:1px}
.admin-nav{padding:16px 12px}
.admin-nav-section{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.3);text-transform:uppercase;padding:12px 8px 6px}
.admin-nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,0.7);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:2px}
.admin-nav-link:hover{background:rgba(255,255,255,0.07);color:#fff}
.admin-nav-link.active{background:rgba(59,130,246,0.25);color:#93c5fd}
.admin-main{background:#f0f3f9;padding:0}
.admin-topbar{background:#fff;padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.admin-topbar-title{font-size:20px;font-weight:700;color:var(--navy)}
.admin-body{padding:32px}
.admin-card{background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden}
.admin-card-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.admin-card-title{font-size:16px;font-weight:700;color:var(--navy)}
.admin-table{width:100%;border-collapse:collapse}
.admin-table th{padding:12px 16px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;background:#f8fafd;text-align:left;border-bottom:1px solid var(--border)}
.admin-table td{padding:14px 16px;font-size:14px;border-bottom:1px solid #f0f3f9;vertical-align:middle}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:#fafbff}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px;margin-bottom:32px}
.stat-card{background:#fff;border-radius:14px;padding:24px;border:1px solid var(--border)}
.stat-card-label{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-card-value{font-size:36px;font-weight:700;color:var(--navy);font-family:'Playfair Display',serif}
.stat-card-icon{font-size:28px;float:right;margin-top:-4px}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:12px;font-weight:600}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-green{background:#d1fae5;color:#065f46}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-grey{background:#f1f5f9;color:#475569}
.modal-overlay{position:fixed;inset:0;background:rgba(10,22,40,0.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:20px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:32px;box-shadow:var(--shadow-lg)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.modal-title{font-size:22px;font-weight:700;color:var(--navy)}
.modal-close{background:var(--grey);border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;color:var(--muted)}
.modal-close:hover{background:var(--border)}
.spec-editor-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:center}

/* TOAST */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#fff;border-radius:10px;padding:14px 20px;box-shadow:var(--shadow-lg);border-left:4px solid var(--sky);font-size:14px;font-weight:500;min-width:280px;animation:slideIn .3s ease}
.toast.success{border-left-color:var(--success)}
.toast.error{border-left-color:var(--danger)}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

/* PAGE HERO */
.page-hero{background:linear-gradient(135deg,var(--navy),var(--blue));padding:80px 0 60px;margin-top:72px}
.page-hero-title{font-size:clamp(28px,4vw,44px);color:#fff;font-weight:700;margin-bottom:12px}
.page-hero-desc{color:rgba(255,255,255,0.7);font-size:17px}

/* WHATSAPP BUTTON */
.whatsapp-btn{position:fixed;bottom:28px;right:28px;z-index:500;background:#25d366;color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 20px rgba(37,211,102,0.4);transition:all .3s;border:none;cursor:pointer}
.whatsapp-btn:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,211,102,0.5)}

/* FOOTER */
footer{background:var(--navy);color:rgba(255,255,255,0.8);padding:64px 0 24px}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:48px}
.footer-brand-name{font-size:22px;font-weight:700;color:#fff;font-family:'Playfair Display',serif;margin-bottom:12px}
.footer-brand-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.55)}
.footer-heading{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:16px}
.footer-link{display:block;font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:10px;transition:color .2s}
.footer-link:hover{color:#fff}
.footer-bottom{border-top:1px solid rgba(255,255,255,0.08);padding-top:24px;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:rgba(255,255,255,0.35)}
.login-page{min-height:100vh;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:var(--shadow-lg)}
.login-title{font-size:28px;font-weight:700;color:var(--navy);margin-bottom:6px}
.login-sub{color:var(--muted);font-size:14px;margin-bottom:32px}
.empty-state{text-align:center;padding:64px 24px;color:var(--muted)}
.empty-icon{font-size:56px;margin-bottom:16px}
.empty-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px}

/* LOADING */
.spinner{width:36px;height:36px;border:3px solid var(--steel);border-top-color:var(--sky);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUCCESS */
.success-box{background:#d1fae5;border:1px solid #a7f3d0;border-radius:12px;padding:20px 24px;color:#065f46;font-size:15px;display:flex;gap:12px;align-items:flex-start}

/* MOBILE */
@media(max-width:900px){
  .hero-content{grid-template-columns:1fr;gap:40px}
  .hero-visual{display:none}
  .product-detail-layout{grid-template-columns:1fr}
  .footer-grid{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .admin-layout{grid-template-columns:1fr}
  .admin-sidebar{position:fixed;left:-260px;z-index:1500;height:100%;transition:left .3s}
  .admin-sidebar.open{left:0}
  .mobile-menu-btn{display:block}
  .nav-links{display:none}
  .nav-links.open{display:flex;flex-direction:column;position:absolute;top:72px;left:0;right:0;background:var(--navy);padding:16px;gap:4px}
}
@media(max-width:600px){
  .footer-grid{grid-template-columns:1fr}
  .hero-stats{gap:20px}
  .stat-card-value{font-size:28px}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, createContext, useContext } = React;

// ═══════════════════════════════════════════
// DATA STORE (localStorage as mock DB)
// ═══════════════════════════════════════════
const DB = {
  get: (key) => { try { return JSON.parse(localStorage.getItem('gtl_'+key)||'null'); } catch{return null;} },
  set: (key, val) => localStorage.setItem('gtl_'+key, JSON.stringify(val)),
  init: () => {
    if (!DB.get('init')) {
      DB.set('categories', [
        { id:'cat1', name:'Automobiles', slug:'automobiles', description:'Wide range of passenger, commercial and specialty vehicles', icon:'🚗', image:'', active:true, createdAt: new Date().toISOString() },
        { id:'cat2', name:'Medical Equipment', slug:'medical-equipment', description:'Professional medical devices and healthcare instruments', icon:'🏥', image:'', active:true, createdAt: new Date().toISOString() }
      ]);

function Toast({ toasts }) {
  return <div className="toast-container">{toasts.map(t=>

}

function Navbar({ page, setPage, isAdmin }) {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const links = [
    { label:'Home', p:'home' },
    { label:'Categories', p:'categories' },
    { label:'Products', p:'products' },
    { label:'About', p:'about' },

  return (
    <nav id="navbar" className={scrolled?'scrolled':''}>

function InquiryModal({ product, onClose, addToast }) {
  const [form, setForm] = useState({ name:'', email:'', phone:'', message:'' });
  const [submitted, setSubmitted] = useState(false);
  const submit = (e) => {
    e.preventDefault();
    const inquiries = DB.get('inquiries') || [];
    inquiries.unshift({ id:genId(), ...form, productId:product?.id, productName:product?.name, read:false, createdAt:new Date().toISOString() });
    DB.set('inquiries', inquiries);
    setSubmitted(true);
    addToast('Inquiry sent successfully!', 'success');
    setTimeout(onClose, 2000);
  };
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">Send Inquiry</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        {product && <div style={{background:'var(--grey)',borderRadius:10,padding:'12px 16px',marginBottom:20,fontSize:14}}><strong>Product:</strong> {product.name}</div>}
        {submitted ? (
          <div className="success-box">✅ <strong>Inquiry submitted! We'll be in touch within 24 hours.</strong></div>
        ) : (
          <form onSubmit={submit}>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Name *</label><input className="form-input" required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Your name"/></div>
              <div className="form-group"><label className="form-label">Email *</label><input className="form-input" type="email" required value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="your@email.com"/></div>
            </div>
            <div className="form-group"><label className="form-label">Phone</label><input className="form-input" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="+1 234 567 8900"/></div>
            <div className="form-group"><label className="form-label">Message *</label><textarea className="form-textarea" required value={form.message} onChange={e=>setForm({...form,message:e.target.value})} placeholder="Describe your requirements..." rows={4}/></div>
            <button type="submit" className="btn btn-primary" style={{width:'100%',justifyContent:'center'}}>Send Inquiry →</button>
          </form>
        )}
      </div>
    </div>
  );
}

function AdminCategories({ categories, addToast, refreshData }) {
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name:'', description:'', icon:'', active:true });

  const openAdd = () => { setEditing(null); setForm({ name:'', description:'', icon:'', active:true }); setShowModal(true); };
  const openEdit = (cat) => { setEditing(cat); setForm({ name:cat.name, description:cat.description||'', icon:cat.icon||'', active:cat.active }); setShowModal(true); };

  const save = (e) => {
    e.preventDefault();
    const cats = DB.get('categories') || [];
    if (editing) {
      const updated = cats.map(c => c.id===editing.id ? { ...c, ...form, slug:slugify(form.name) } : c);
      DB.set('categories', updated);
      addToast('Category updated!', 'success');
    } else {
      cats.push({ id:genId(), ...form, slug:slugify(form.name), image:'', createdAt:new Date().toISOString() });
      DB.set('categories', cats);
      addToast('Category created!', 'success');
    }
    refreshData(); setShowModal(false);
  };

  const del = (id) => {
    if (!confirm('Delete this category?')) return;
    const prods = DB.get('products')||[];
    const inUse = prods.some(p=>p.categoryId===id);
    if (inUse) { addToast('Cannot delete: category has products.', 'error'); return; }
    DB.set('categories', (DB.get('categories')||[]).filter(c=>c.id!==id));
    refreshData(); addToast('Category deleted.', 'success');
  };

  return (
    <div>
      <div className="admin-card">
        <div className="admin-card-header">
          <div className="admin-card-title">All Categories ({categories.length})</div>
          <button className="btn btn-primary btn-sm" onClick={openAdd}>+ Add Category</button>
        </div>
        <table className="admin-table">
          <thead><tr><th>Icon</th><th>Name</th><th>Description</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            {categories.map(cat=>(
              <tr key={cat.id}>
                <td style={{fontSize:28}}>{cat.icon||'📦'}</td>
                <td><div style={{fontWeight:700}}>{cat.name}</div><div style={{fontSize:12,color:'var(--muted)'}}>/{cat.slug}</div></td>
                <td style={{fontSize:13,color:'var(--muted)',maxWidth:220}}>{cat.description}</td>
                <td><span className={`badge ${cat.active?'badge-green':'badge-grey'}`}>{cat.active?'Active':'Inactive'}</span></td>
                <td><div style={{display:'flex',gap:8'}}>
                  <button className="btn btn-sm" style={{background:'var(--steel)',border:'none',color:'var(--navy)'}} onClick={()=>openEdit(cat)}>✏ Edit</button>
                  <button className="btn btn-sm btn-danger" onClick={()=>del(cat.id)}>🗑</button>
                </div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {showModal && (
        <div className="modal-overlay">
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">{editing?'Edit Category':'New Category'}</div>
              <button className="modal-close" onClick={()=>setShowModal(false)}>✕</button>
            </div>
            <form onSubmit={save}>
              <div className="form-group"><label className="form-label">Category Name *</label><input className="form-input" required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. Automobiles"/></div>
              <div className="form-group"><label className="form-label">Description</label><textarea className="form-textarea" rows={3} value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Short description..."/></div>
              <div className="form-group"><label className="form-label">Icon (emoji)</label><input className="form-input" value={form.icon} onChange={e=>setForm({...form,icon:e.target.value})} placeholder="🚗"/></div>
              <div className="form-group" style={{display:'flex',alignItems:'center',gap:10}}>
                <input type="checkbox" id="cat-active" checked={form.active} onChange={e=>setForm({...form,active:e.target.checked})} style={{width:18,height:18}}/>
                <label htmlFor="cat-active" className="form-label" style={{margin:0}}>Active (visible on website)</label>
              </div>
              <div style={{display:'flex',gap:12,marginTop:8}}>
                <button type="submit" className="btn btn-primary" style={{flex:1,justifyContent:'center'}}>Save Category</button>
                <button type="button" className="btn" style={{background:'var(--steel)',border:'none'}} onClick={()=>setShowModal(false)}>Cancel</button>
              </div>
            </form>
          </div>
        </div>

  );

function AdminProducts({ products, categories, addToast, refreshData }) {
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({ name:'', categoryId:'', description:'', shortDescription:'', featured:false, active:true, specifications:[], imageUrls:'' });
  const [specs, setSpecs] = useState([{ key:'', value:'' }]);

  const openAdd = () => { setEditing(null); setForm({ name:'', categoryId:categories[0]?.id||'', description:'', shortDescription:'', featured:false, active:true, specifications:[], imageUrls:'' }); setSpecs([{key:'',value:''}]); setShowModal(true); };
  const openEdit = (p) => { setEditing(p); setForm({ name:p.name, categoryId:p.categoryId, description:p.description||'', shortDescription:p.shortDescription||'', featured:p.featured, active:p.active, imageUrls:p.images?.join('\n')||'' }); setSpecs(p.specifications?.length ? p.specifications : [{key:'',value:''}]); setShowModal(true); };

  const addSpec = () => setSpecs([...specs, { key:'', value:'' }]);
  const removeSpec = (i) => setSpecs(specs.filter((_,idx)=>idx!==i));
  const updateSpec = (i, field, val) => { const s=[...specs]; s[i]={...s[i],[field]:val}; setSpecs(s); };

  const save = (e) => {
    e.preventDefault();
    const cat = categories.find(c=>c.id===form.categoryId);
    const imgs = form.imageUrls.split('\n').map(u=>u.trim()).filter(Boolean);
    const allProds = DB.get('products') || [];
    const validSpecs = specs.filter(s=>s.key&&s.value);
    if (editing) {
      const updated = allProds.map(p => p.id===editing.id ? { ...p, ...form, images:imgs, specifications:validSpecs, categoryName:cat?.name||'', slug:slugify(form.name)+'-'+p.id } : p);
      DB.set('products', updated);
      addToast('Product updated!', 'success');
    } else {
      const id = genId();
      allProds.unshift({ id, ...form, images:imgs, specifications:validSpecs, categoryName:cat?.name||'', slug:slugify(form.name)+'-'+id, createdAt:new Date().toISOString() });
      DB.set('products', allProds);
      addToast('Product created!', 'success');
    }
    refreshData(); setShowModal(false);
  };

  const del = (id) => {
    if (!confirm('Delete this product?')) return;
    DB.set('products', (DB.get('products')||[]).filter(p=>p.id!==id));
    refreshData(); addToast('Product deleted.', 'success');
  };

  const toggle = (id, field) => {
    const prods = DB.get('products')||[];
    const updated = prods.map(p=>p.id===id?{...p,[field]:!p[field]}:p);
    DB.set('products', updated);
    refreshData();
  };

  return (
    <div>
      <div className="admin-card">
        <div className="admin-card-header">
          <div className="admin-card-title">All Products ({products.length})</div>
          <button className="btn btn-primary btn-sm" onClick={openAdd}>+ Add Product</button>
        </div>
        <div style={{overflowX:'auto'}}>
        <table className="admin-table">
          <thead><tr><th>Product</th><th>Category</th><th>Featured</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            {products.map(p=>(
              <tr key={p.id}>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:40,height:40,borderRadius:8,background:'var(--steel)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>
                      {p.images?.[0] ? <img src={p.images[0]} alt="" style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:8}}/> : (p.categoryId==='cat1'?'🚗':'🏥')}
                    </div>
                    <div><div style={{fontWeight:700,fontSize:14}}>{p.name}</div><div style={{fontSize:12,color:'var(--muted)'}}>{p.specifications?.length||0} specs</div></div>
                  </div>
                </td>
                <td><span className="badge badge-blue">{p.categoryName}</span></td>
                <td>
                  <button onClick={()=>toggle(p.id,'featured')} style={{background:'none',border:'none',fontSize:20,cursor:'pointer'}}>
                    {p.featured?'⭐':'☆'}
                  </button>
                </td>
                <td><span className={`badge ${p.active?'badge-green':'badge-grey'}`} style={{cursor:'pointer'}} onClick={()=>toggle(p.id,'active')}>{p.active?'Active':'Hidden'}</span></td>
                <td><div style={{display:'flex',gap:6}}>
                  <button className="btn btn-sm" style={{background:'var(--steel)',border:'none',color:'var(--navy)'}} onClick={()=>openEdit(p)}>✏</button>
                  <button className="btn btn-sm btn-danger" onClick={()=>del(p.id)}>🗑</button>
                </div></td>
              </tr>
            ))}
          </tbody>
        </table>
        </div>
      </div>
      {showModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="modal" style={{maxWidth:680}}>
            <div className="modal-header">
              <div className="modal-title">{editing?'Edit Product':'New Product'}</div>
              <button className="modal-close" onClick={()=>setShowModal(false)}>✕</button>
            </div>
            <form onSubmit={save}>
              <div className="form-row">
                <div className="form-group"><label className="form-label">Product Name *</label><input className="form-input" required value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Product name"/></div>
                <div className="form-group"><label className="form-label">Category *</label>
                  <select className="form-select" value={form.categoryId} onChange={e=>setForm({...form,categoryId:e.target.value})}>
                    {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-group"><label className="form-label">Short Description</label><input className="form-input" value={form.shortDescription} onChange={e=>setForm({...form,shortDescription:e.target.value})} placeholder="One-line summary..."/></div>
              <div className="form-group"><label className="form-label">Full Description *</label><textarea className="form-textarea" rows={4} required value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Detailed product description..."/></div>
              <div className="form-group">
                <label className="form-label">Image URLs (one per line)</label>
                <textarea className="form-textarea" rows={3} value={form.imageUrls} onChange={e=>setForm({...form,imageUrls:e.target.value})} placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.jpg"/>
                <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Enter direct image URLs, one per line. In production, use file upload.</div>
              </div>
              <div className="form-group">
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                  <label className="form-label" style={{margin:0}}>Specifications</label>
                  <button type="button" className="btn btn-sm" style={{background:'var(--steel)',border:'none'}} onClick={addSpec}>+ Add Row</button>
                </div>
                {specs.map((s,i)=>(
                  <div key={i} className="spec-editor-row">
                    <input className="form-input" placeholder="Key (e.g. Engine)" value={s.key} onChange={e=>updateSpec(i,'key',e.target.value)}/>
                    <input className="form-input" placeholder="Value (e.g. V8 Turbo)" value={s.value} onChange={e=>updateSpec(i,'value',e.target.value)}/>
                    <button type="button" onClick={()=>removeSpec(i)} style={{background:'var(--danger)',color:'#fff',border:'none',borderRadius:6,padding:'8px 10px',cursor:'pointer'}}>✕</button>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:20,marginBottom:20}}>
                <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:14}}>
                  <input type="checkbox" checked={form.featured} onChange={e=>setForm({...form,featured:e.target.checked})} style={{width:16,height:16}}/>
                  ⭐ Featured Product
                </label>
                <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',fontSize:14}}>
                  <input type="checkbox" checked={form.active} onChange={e=>setForm({...form,active:e.target.checked})} style={{width:16,height:16}}/>
                  ✅ Active (visible)
                </label>
              </div>
              <div style={{display:'flex',gap:12}}>
                <button type="submit" className="btn btn-primary" style={{flex:1,justifyContent:'center'}}>Save Product</button>
                <button type="button" className="btn" style={{background:'var(--steel)',border:'none'}} onClick={()=>setShowModal(false)}>Cancel</button>
              </div>
            </form>
          </div>
        </div>
      )}
    </div>
  );
}

function AdminInquiries({ inquiries, addToast, refreshData }) {
  const [selected, setSelected] = useState(null);
  const toggleRead = (id, val) => {
    const inqs = (DB.get('inquiries')||[]).map(i=>i.id===id?{...i,read:val}:i);
    DB.set('inquiries', inqs);
    refreshData();
    addToast(val?'Marked as read.':'Marked as unread.', 'success');
  };
  const del = (id) => {
    if (!confirm('Delete inquiry?')) return;
    DB.set('inquiries', (DB.get('inquiries')||[]).filter(i=>i.id!==id));
    refreshData(); addToast('Inquiry deleted.', 'success');
    if (selected?.id===id) setSelected(null);
  };
  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:selected?'1fr 380px':'1fr',gap:24,alignItems:'start'}}>
        <div className="admin-card">
          <div className="admin-card-header">
            <div className="admin-card-title">All Inquiries ({inquiries.length})</div>
            <span className="badge badge-red">{inquiries.filter(i=>!i.read).length} unread</span>
          </div>
          <table className="admin-table">
            <thead><tr><th>Customer</th><th>Product</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {inquiries.map(inq=>(
                <tr key={inq.id} style={{background:selected?.id===inq.id?'#f0f6ff':''}}>
                  <td>
                    <div style={{fontWeight:inq.read?400:700}}>{inq.name}</div>
                    <div style={{fontSize:12,color:'var(--muted)'}}>{inq.email}</div>
                  </td>
                  <td style={{fontSize:13,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{inq.productName||'General'}</td>
                  <td style={{fontSize:12,color:'var(--muted)'}}>{new Date(inq.createdAt).toLocaleDateString()}</td>
                  <td><span className={`badge ${inq.read?'badge-green':'badge-red'}`}>{inq.read?'Read':'Unread'}</span></td>
                  <td>
                    <div style={{display:'flex',gap:6}}>
                      <button className="btn btn-sm" style={{background:'var(--steel)',border:'none',color:'var(--navy)'}} onClick={()=>setSelected(inq)}>👁 View</button>
                      <button className="btn btn-sm" style={{background:'var(--steel)',border:'none',fontSize:11}} onClick={()=>toggleRead(inq.id,!inq.read)}>{inq.read?'Unread':'Read'}</button>
                      <button className="btn btn-sm btn-danger" onClick={()=>del(inq.id)}>🗑</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {selected && (
          <div className="admin-card" style={{position:'sticky',top:80}}>
            <div className="admin-card-header">
              <div className="admin-card-title">Inquiry Detail</div>
              <button style={{background:'var(--steel)',border:'none',borderRadius:50,width:28,height:28,cursor:'pointer',fontSize:14}} onClick={()=>setSelected(null)}>✕</button>
            </div>
            <div style={{padding:20}}>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20,paddingBottom:16,borderBottom:'1px solid var(--border)'}}>
                <div style={{width:44,height:44,borderRadius:50,background:'var(--sky)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:16,flexShrink:0}}>{selected.name[0].toUpperCase()}</div>
                <div><div style={{fontWeight:700,fontSize:16}}>{selected.name}</div><div style={{fontSize:13,color:'var(--muted)'}}>{new Date(selected.createdAt).toLocaleString()}</div></div>
              </div>
              {[['Email',selected.email],['Phone',selected.phone||'Not provided'],['Product',selected.productName||'General Inquiry']].map(([l,v])=>(
                <div key={l} style={{marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:'var(--muted)',marginBottom:3}}>{l}</div>
                  <div style={{fontSize:14,color:'var(--text)'}}>{v}</div>
                </div>
              ))}
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>Message</div>
                <div style={{background:'var(--grey)',borderRadius:10,padding:'12px 14px',fontSize:14,lineHeight:1.7}}>{selected.message}</div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <a href={`mailto:${selected.email}`} className="btn btn-primary btn-sm" style={{flex:1,justifyContent:'center',textDecoration:'none'}}>✉ Reply by Email</a>
                <button className="btn btn-sm" style={{background:'var(--steel)',border:'none'}} onClick={()=>toggleRead(selected.id,!selected.read)}>{selected.read?'Mark Unread':'Mark Read'}</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App() {
  const [page, setPage] = useState('home');
  const [adminPage, setAdminPage] = useState('admin-dashboard');
  const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [categories, setCategories] = useState([]);
  const [products, setProducts] = useState([]);
  const [inquiries, setInquiries] = useState([]);

  const addToast = useCallback((msg, type='success') => {
    const id = genId();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)), 4000);
  }, []);

  const refreshData = useCallback(() => {
    setCategories(DB.get('categories')||[]);
    setProducts(DB.get('products')||[]);
    setInquiries(DB.get('inquiries')||[]);
  }, []);

  useEffect(() => {
    DB.init();
    refreshData();
    window.scrollTo(0,0);
  }, [page]);

  const isAdminPage = page.startsWith('admin');
  const showNavFooter = !isAdminPage;

  const goPage = (p) => {
    if (p.startsWith('admin') && !isAdminLoggedIn) { setPage('admin-login'); return; }
    setPage(p);
    if (!p.startsWith('admin')) window.scrollTo({top:0,behavior:'smooth'});
  };

  const renderPage = () => {
    if (page === 'admin-login') return <AdminLogin onLogin={()=>{setIsAdminLoggedIn(true);setPage('admin-dashboard');setAdminPage('admin-dashboard');}}/>;
    if (isAdminPage && isAdminLoggedIn) return <AdminDashboard categories={categories} products={products} inquiries={inquiries} setPage={goPage} adminPage={adminPage} setAdminPage={setAdminPage} addToast={addToast} refreshData={refreshData}/>;
    switch(page) {
      case 'categories': return <CategoriesPage categories={categories} setPage={goPage} products={products}/>;
      case 'products': return <ProductsPage products={products} categories={categories} setPage={goPage} setSelectedProduct={setSelectedProduct} addToast={addToast}/>;
      case 'product-detail': return selectedProduct ? <ProductDetailPage product={selectedProduct} setPage={goPage} addToast={addToast}/> : <ProductsPage products={products} categories={categories} setPage={goPage} setSelectedProduct={setSelectedProduct} addToast={addToast}/>;
      case 'inquiry': return <InquiryPage addToast={addToast}/>;
      case 'about': return <AboutPage setPage={goPage}/>;
      default: return <HomePage setPage={goPage} categories={categories} products={products} addToast={addToast} setSelectedProduct={setSelectedProduct}/>;
    }
  };

  return (
    <div>
      <Toast toasts={toasts}/>
      {showNavFooter && <Navbar page={page} setPage={goPage} isAdmin={isAdminLoggedIn}/>}
      <div style={showNavFooter && page!=='home' ? {paddingTop:0} : {}}>
        {renderPage()}
      </div>
      {showNavFooter && <Footer setPage={goPage}/>}
      {showNavFooter && (
        <a href="https://wa.me/1234567890" target="_blank" className="whatsapp-btn" title="WhatsApp Us">
          <svg viewBox="0 0 32 32" fill="currentColor" width="28" height="28"><path d="M16 0C7.163 0 0 7.163 0 16c0 2.815.73 5.457 2.008 7.752L0 32l8.465-2.22A15.934 15.934 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm7.833 22.5c-.326.917-1.897 1.75-2.584 1.793-.687.043-1.36.317-4.583-.958-3.877-1.544-6.35-5.487-6.54-5.74-.19-.254-1.553-2.07-1.553-3.944s1.233-2.8 1.67-3.183c.437-.383.952-.48 1.27-.48.317 0 .634.003.912.016.293.014.685-.111.074 1.69-.611 1.801-.738 2.157-.504 2.558.234.4.416.657 1.027 1.357.611.7.928 1.074 1.57 1.32.641.247 1.024.206 1.41-.123.385-.33 1.65-1.93 2.092-2.595.44-.665.877-.553 1.48-.332.603.22 3.835 1.81 4.496 2.137.661.328.77.654.443 1.484z"/></svg>
        </a>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
